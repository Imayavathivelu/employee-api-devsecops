sonar.projectKey=employee-api
sonar.projectName=Employee API
sonar.projectVersion=1.0

# Scan only the application code
sonar.sources=.

# Exclude virtual environment and other generated files
sonar.exclusions=.venv/**,venv/**,__pycache__/**,tests/**

# Python version
sonar.python.version=3.12

# Encoding
sonar.sourceEncoding=UTF-8